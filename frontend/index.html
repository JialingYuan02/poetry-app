<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>拾句</title>
  <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="static/css/custom.css">
</head>
<body>

  <div id="bg-image"></div>
  <div id="bg-overlay"></div>

  <div id="app">

    <!-- Phase 1: Landing -->
    <section id="phase-landing" class="phase active">
      <div class="landing-content">
        <h1 class="landing-title">拾句</h1>
        <p class="landing-sub">将相片辅以诗句，点亮日历</p>
        <p class="landing-quote">人生不过采撷片刻，缀之成串。</p>
        <button id="enter-btn" class="btn-outline-round">开始记录 →</button>
        <button id="landing-cal-btn" class="btn-text-link">查看日历</button>
      </div>
    </section>

    <!-- Phase 2: Upload -->
    <section id="phase-upload" class="phase">
      <div class="phase-topbar">
        <button class="btn-text-link" id="upload-home-btn">← 首页</button>
      </div>
      <h1 class="app-title">拾句</h1>

      <label id="upload-zone" class="glass" for="photo-input">
        <div id="upload-inner">
          <svg class="upload-icon" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="6" y="14" width="36" height="26" rx="4" stroke="currentColor" stroke-width="1.5"/>
            <circle cx="24" cy="27" r="7" stroke="currentColor" stroke-width="1.5"/>
            <path d="M18 14l3-5h6l3 5" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
            <circle cx="36" cy="21" r="2" fill="currentColor" opacity="0.5"/>
          </svg>
          <p class="upload-hint">拍摄或选择照片</p>
        </div>
        <input type="file" id="photo-input" accept="image/*">
      </label>

      <div class="input-wrap glass">
        <input type="text" id="mood-input" placeholder="此刻的心情… （可选）" maxlength="50" autocomplete="off">
      </div>

      <div class="input-wrap glass date-wrap">
        <span class="date-label">日期</span>
        <input type="date" id="date-input">
      </div>

      <button id="match-btn" class="btn-primary" disabled>配　诗</button>
      <button id="to-calendar-btn" class="btn-ghost">查看日历</button>
    </section>

    <!-- Phase 3: Loading -->
    <section id="phase-loading" class="phase">
      <div class="loading-wrap">
        <div class="loading-ring"></div>
        <p class="loading-text">古人曾见此景…</p>
      </div>
    </section>

    <!-- Phase 4: Result -->
    <section id="phase-result" class="phase">
      <div id="analysis-tags"></div>
      <div id="card-counter"></div>

      <div id="cards-row">
        <button id="prev-btn" class="nav-btn" disabled>&#8249;</button>
        <div id="cards-viewport"></div>
        <button id="next-btn" class="nav-btn">&#8250;</button>
      </div>

      <div id="card-dots"></div>
      <button id="confirm-btn" class="btn-primary">选定这首</button>
      <button id="reset-btn" class="btn-ghost">↩ 重新拍照</button>
    </section>

    <!-- Phase 5: Calendar (split panel) -->
    <section id="phase-calendar" class="phase">

      <div id="cal-left">
        <div class="cal-header">
          <button class="cal-nav" id="cal-prev">&#8249;</button>
          <span id="cal-title" class="cal-month-title"></span>
          <button class="cal-nav" id="cal-next">&#8250;</button>
          <div class="cal-header-actions">
            <button class="cal-icon-btn" id="cal-poems-btn" title="本月诗词">册</button>
            <button class="cal-icon-btn" id="cal-add" title="新增">＋</button>
            <button class="cal-icon-btn" id="cal-home-btn" title="首页">首</button>
          </div>
        </div>
        <div class="cal-weekdays">
          <span>日</span><span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span>
        </div>
        <div id="cal-grid"></div>
      </div>

      <!-- Right panel: day detail or poems list -->
      <div id="cal-panel">
        <div id="cal-panel-inner"></div>
      </div>

    </section>

    <!-- Phase 6: Monthly poems -->
    <section id="phase-poems" class="phase">
      <div class="poems-header">
        <button class="detail-back-btn" id="poems-back">← 日历</button>
        <span id="poems-title" class="cal-month-title"></span>
      </div>
      <div id="poems-list"></div>
    </section>

  </div>

  <script src="static/js/app.js" type="module"></script>
</body>
</html>
